version: "3.9"

services:
  web:
    build: .
    command: python run_web.py
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./config:/app/config

  bot:
    build: .
    command: python run_bot.py
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./config:/app/config
